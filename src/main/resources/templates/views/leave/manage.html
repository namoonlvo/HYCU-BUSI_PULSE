<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/meta :: meta}"></th:block>
  <title>Busi Pulse | 휴가/연차 관리</title>
  <style>
    .status-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:999px; font-size:12px; font-weight:500; border-width:1px; }
    .quota-bar { height:8px; border-radius:4px; background:#e5e7eb; overflow:hidden; }
    .quota-bar-fill { height:100%; border-radius:4px; transition:width 0.4s; }
    .tab-btn { padding:10px 16px; font-size:13px; font-weight:500; border-bottom:2px solid transparent; transition:all 0.15s; cursor:pointer; color:#9ca3af; white-space:nowrap; }
    .tab-btn.active { border-bottom-color:#5038A6; color:#5038A6; font-weight:600; }
    .leave-bar { font-size:11px; font-weight:500; padding:1px 5px; border-radius:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
    .calendar-cell { min-height:80px; }
    .calendar-cell.other-month { opacity:.35; }
  </style>
</head>
<body class="bg-gray-50 font-sans">

  <th:block th:replace="~{fragments/header :: sidebar}"></th:block>

  <div id="main-wrapper" class="min-h-screen flex flex-col transition-all duration-300">
    <th:block th:replace="~{fragments/header :: gnb-header}"></th:block>

    <main class="flex-1 p-6 space-y-5">

      <!-- Title -->
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold text-gray-800">휴가 / 연차 관리</h1>
          <p class="text-sm text-gray-500 mt-0.5">나의 연차 잔여 현황과 휴가 신청 내역을 관리하세요.</p>
        </div>
        <button onclick="openApplyModal()" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-white shadow-sm hover:shadow-md transition-all" style="background:#5038A6;">
          <i class="fa-solid fa-plus text-xs"></i> 휴가 신청
        </button>
      </div>

      <!-- 연차 현황 카드 -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-semibold text-gray-500">총 연차</span>
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:rgba(80,56,166,0.1);">
              <i class="fa-solid fa-calendar-days text-xs" style="color:#5038A6;"></i>
            </div>
          </div>
          <p class="text-3xl font-bold text-gray-800">15<span class="text-sm font-normal text-gray-400 ml-1">일</span></p>
          <p class="text-xs text-gray-400 mt-1">2026년 기준</p>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-semibold text-gray-500">사용 연차</span>
            <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-amber-50">
              <i class="fa-solid fa-check text-xs text-amber-500"></i>
            </div>
          </div>
          <p class="text-3xl font-bold text-gray-800">5<span class="text-sm font-normal text-gray-400 ml-1">일</span></p>
          <div class="quota-bar mt-2"><div class="quota-bar-fill bg-amber-400" style="width:33%;"></div></div>
          <p class="text-xs text-gray-400 mt-1">33% 사용</p>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-semibold text-gray-500">잔여 연차</span>
            <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-emerald-50">
              <i class="fa-solid fa-hourglass-half text-xs text-emerald-500"></i>
            </div>
          </div>
          <p class="text-3xl font-bold text-emerald-600">10<span class="text-sm font-normal text-gray-400 ml-1">일</span></p>
          <div class="quota-bar mt-2"><div class="quota-bar-fill" style="width:67%;background:#10b981;"></div></div>
          <p class="text-xs text-gray-400 mt-1">67% 잔여</p>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-semibold text-gray-500">승인 대기</span>
            <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-blue-50">
              <i class="fa-solid fa-clock text-xs text-blue-500"></i>
            </div>
          </div>
          <p class="text-3xl font-bold text-blue-600">1<span class="text-sm font-normal text-gray-400 ml-1">건</span></p>
          <p class="text-xs text-gray-400 mt-1">검토 중</p>
        </div>
      </div>

      <!-- 탭 영역 -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="flex border-b border-gray-100 px-4 overflow-x-auto">
          <button class="tab-btn active" onclick="switchTab('list', this)">신청 내역</button>
          <button class="tab-btn" onclick="switchTab('calendar', this)">캘린더 뷰</button>
          <button class="tab-btn" onclick="switchTab('team', this)">팀원 현황</button>
        </div>

        <!-- 신청 내역 -->
        <div id="tab-list" class="tab-content p-5">
          <div class="flex flex-wrap items-center gap-3 mb-4">
            <div class="relative max-w-xs flex-1 min-w-[140px]">
              <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
              <input type="text" id="listSearch" placeholder="검색..." oninput="renderList()"
                class="w-full pl-8 pr-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
            </div>
            <select id="listStatusFilter" onchange="renderList()" class="px-3 py-2 text-xs rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
              <option value="">상태 전체</option>
              <option value="승인대기">승인 대기</option>
              <option value="승인">승인</option>
              <option value="반려">반려</option>
              <option value="취소">취소</option>
            </select>
            <select id="listTypeFilter" onchange="renderList()" class="px-3 py-2 text-xs rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
              <option value="">유형 전체</option>
              <option value="연차">연차</option>
              <option value="반차(오전)">반차(오전)</option>
              <option value="반차(오후)">반차(오후)</option>
              <option value="병가">병가</option>
              <option value="경조사">경조사</option>
              <option value="공가">공가</option>
            </select>
            <span class="ml-auto text-xs text-gray-400" id="listCount"></span>
          </div>
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-50">
                <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500 rounded-l-xl">유형</th>
                <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500">기간</th>
                <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500 w-12">일수</th>
                <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500">사유</th>
                <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500">대리자</th>
                <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500">신청일</th>
                <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500 w-20">상태</th>
                <th class="px-3 py-2.5 text-center text-xs font-semibold text-gray-500 rounded-r-xl w-14">액션</th>
              </tr>
            </thead>
            <tbody id="listBody"></tbody>
          </table>
          <div id="listEmpty" class="hidden py-16 text-center">
            <i class="fa-solid fa-calendar-xmark text-gray-300 text-3xl mb-3 block"></i>
            <p class="text-sm text-gray-400">신청 내역이 없습니다</p>
          </div>
        </div>

        <!-- 캘린더 뷰 -->
        <div id="tab-calendar" class="tab-content hidden p-5">
          <div class="flex items-center justify-between mb-4">
            <button onclick="prevMonth()" class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 hover:border-purple-300 hover:text-purple-600 transition text-gray-500">
              <i class="fa-solid fa-chevron-left text-xs"></i>
            </button>
            <h3 class="text-base font-bold text-gray-800" id="calMonthLabel"></h3>
            <button onclick="nextMonth()" class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 hover:border-purple-300 hover:text-purple-600 transition text-gray-500">
              <i class="fa-solid fa-chevron-right text-xs"></i>
            </button>
          </div>
          <div class="grid grid-cols-7 mb-1">
            <div class="text-center text-xs font-semibold text-red-400 py-2">일</div>
            <div class="text-center text-xs font-semibold text-gray-500 py-2">월</div>
            <div class="text-center text-xs font-semibold text-gray-500 py-2">화</div>
            <div class="text-center text-xs font-semibold text-gray-500 py-2">수</div>
            <div class="text-center text-xs font-semibold text-gray-500 py-2">목</div>
            <div class="text-center text-xs font-semibold text-gray-500 py-2">금</div>
            <div class="text-center text-xs font-semibold text-blue-400 py-2">토</div>
          </div>
          <div class="grid grid-cols-7 gap-px bg-gray-100 rounded-xl overflow-hidden border border-gray-100" id="calGrid"></div>
          <div class="flex items-center gap-5 mt-3 flex-wrap">
            <span class="text-xs text-gray-500 font-medium">범례</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-600"><span class="w-3 h-3 rounded inline-block" style="background:rgba(80,56,166,0.2);"></span>연차</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-600"><span class="w-3 h-3 rounded inline-block bg-amber-100"></span>반차</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-600"><span class="w-3 h-3 rounded inline-block bg-red-100"></span>병가</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-600"><span class="w-3 h-3 rounded inline-block bg-emerald-100"></span>경조사/공가</span>
          </div>
        </div>

        <!-- 팀원 현황 -->
        <div id="tab-team" class="tab-content hidden p-5">
          <p class="text-xs text-gray-500 mb-4">팀원의 연차 사용 현황입니다. (읽기 전용)</p>
          <div class="space-y-3" id="teamList"></div>
        </div>
      </div>

    </main>
  </div>

  <div id="overlay" class="fixed inset-0 bg-black/20 z-20 hidden" onclick="closeAllPanels()"></div>

  <!-- 휴가 신청 모달 -->
  <div id="applyModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeApplyModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[92vh] overflow-y-auto">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 sticky top-0 bg-white z-10">
        <h2 class="text-base font-bold text-gray-800" id="applyModalTitle">휴가 신청</h2>
        <button onclick="closeApplyModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition text-gray-400">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <!-- 유형 선택 -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-2">휴가 유형 <span class="text-red-400">*</span></label>
          <div class="grid grid-cols-3 gap-2" id="typeGrid"></div>
        </div>
        <!-- 기간 -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">기간 <span class="text-red-400">*</span></label>
          <div class="flex items-center gap-2">
            <input type="date" id="leaveStart" onchange="calcDays()" class="flex-1 px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
            <span class="text-gray-400 text-sm" id="endSep">~</span>
            <input type="date" id="leaveEnd" onchange="calcDays()" class="flex-1 px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400" id="leaveEndField">
          </div>
          <div class="mt-2 px-3 py-2 rounded-lg flex items-center justify-between" style="background:rgba(80,56,166,0.06);">
            <span class="text-xs font-medium" style="color:#5038A6;">신청 일수</span>
            <span class="text-sm font-bold" style="color:#5038A6;" id="dayCount">0일</span>
          </div>
        </div>
        <!-- 사유 -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">사유 <span class="text-red-400">*</span></label>
          <textarea id="leaveReason" rows="3" placeholder="휴가 사유를 입력하세요..."
            class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-100 resize-none transition"></textarea>
        </div>
        <!-- 대리업무자 -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">대리 업무자</label>
          <select id="leaveDelegate" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
            <option value="">선택 안함</option>
            <option value="김철수">김철수 (팀장)</option>
            <option value="이영희">이영희 (선임)</option>
            <option value="박민준">박민준 (주임)</option>
            <option value="최수연">최수연 (사원)</option>
          </select>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-gray-100 flex items-center sticky bottom-0 bg-white">
        <button id="applyDeleteBtn" onclick="cancelLeave()" class="hidden items-center gap-2 px-4 py-2 text-sm font-medium text-red-500 hover:bg-red-50 rounded-lg transition">
          <i class="fa-solid fa-ban text-xs"></i> 취소 요청
        </button>
        <div class="flex gap-2 ml-auto">
          <button onclick="closeApplyModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition">닫기</button>
          <button onclick="submitLeave()" class="flex items-center gap-2 px-5 py-2 text-sm font-semibold text-white rounded-lg shadow-sm hover:shadow transition" style="background:#5038A6;">
            <i class="fa-solid fa-paper-plane text-xs"></i> 신청
          </button>
        </div>
      </div>
    </div>
  </div>

  <script th:src="@{/js/common.js}"></script>
  <script>
    // ── 데이터 ──
    let leaves = [
      { id:1, type:'연차',       start:'2026-01-20', end:'2026-01-21', days:2,   reason:'개인 사정',      delegate:'이영희', applyDate:'2026-01-15', status:'승인',    note:'' },
      { id:2, type:'반차(오후)', start:'2026-02-05', end:'2026-02-05', days:0.5, reason:'병원 진료',      delegate:'',       applyDate:'2026-02-03', status:'승인',    note:'' },
      { id:3, type:'연차',       start:'2026-02-17', end:'2026-02-18', days:2,   reason:'설 연휴 연장',   delegate:'박민준', applyDate:'2026-02-10', status:'승인',    note:'' },
      { id:4, type:'반차(오전)', start:'2026-03-04', end:'2026-03-04', days:0.5, reason:'관공서 업무',    delegate:'',       applyDate:'2026-03-03', status:'승인',    note:'' },
      { id:5, type:'연차',       start:'2026-03-24', end:'2026-03-25', days:2,   reason:'개인 여행',      delegate:'이영희', applyDate:'2026-03-18', status:'승인대기',note:'' },
      { id:6, type:'병가',       start:'2026-02-22', end:'2026-02-22', days:1,   reason:'독감',           delegate:'김철수', applyDate:'2026-02-22', status:'승인',    note:'진단서 제출 완료' },
      { id:7, type:'경조사',     start:'2026-01-10', end:'2026-01-10', days:1,   reason:'조부상',         delegate:'이영희', applyDate:'2026-01-09', status:'승인',    note:'' },
    ];
    let nextId = 8;
    let editId = null;

    const typeList = [
      { value:'연차',       icon:'fa-sun',              color:'#5038A6', bg:'rgba(80,56,166,0.1)',   barBg:'rgba(80,56,166,0.15)',  barText:'#5038A6' },
      { value:'반차(오전)', icon:'fa-cloud-sun',        color:'#d97706', bg:'rgba(245,158,11,0.1)',  barBg:'rgba(245,158,11,0.15)', barText:'#b45309' },
      { value:'반차(오후)', icon:'fa-cloud-moon',       color:'#d97706', bg:'rgba(245,158,11,0.1)',  barBg:'rgba(245,158,11,0.15)', barText:'#b45309' },
      { value:'병가',       icon:'fa-heart-pulse',      color:'#ef4444', bg:'rgba(239,68,68,0.1)',   barBg:'rgba(239,68,68,0.12)',  barText:'#dc2626' },
      { value:'경조사',     icon:'fa-gift',             color:'#10b981', bg:'rgba(16,185,129,0.1)',  barBg:'rgba(16,185,129,0.12)', barText:'#059669' },
      { value:'공가',       icon:'fa-building-columns', color:'#3b82f6', bg:'rgba(59,130,246,0.1)',  barBg:'rgba(59,130,246,0.12)', barText:'#2563eb' },
    ];
    const typeMap = {};
    typeList.forEach(t => typeMap[t.value] = t);

    const statusCfg = {
      '승인대기': { text:'text-blue-700',    bg:'bg-blue-50',    border:'border-blue-200',    dot:'bg-blue-400' },
      '승인':     { text:'text-emerald-700', bg:'bg-emerald-50', border:'border-emerald-200', dot:'bg-emerald-400' },
      '반려':     { text:'text-red-700',     bg:'bg-red-50',     border:'border-red-200',     dot:'bg-red-400' },
      '취소':     { text:'text-gray-400',    bg:'bg-gray-50',    border:'border-gray-200',    dot:'bg-gray-300' },
    };

    let selectedType = '연차';

    // ── 유형 그리드 렌더 ──
    function renderTypeGrid() {
      document.getElementById('typeGrid').innerHTML = typeList.map(t => `
        <button type="button" data-type="${t.value}" onclick="selectType('${t.value}')"
          class="leave-type-btn rounded-xl p-3 text-center border-2 transition ${selectedType===t.value ? 'selected' : ''}"
          style="${selectedType===t.value ? 'border-color:'+t.color+';background:'+t.bg+';' : 'border-color:#e5e7eb;background:#fff;'}">
          <i class="fa-solid ${t.icon} text-sm mb-1 block" style="color:${selectedType===t.value?t.color:'#9ca3af'};"></i>
          <p class="text-xs font-semibold" style="color:${selectedType===t.value?t.color:'#6b7280'};">${t.value}</p>
        </button>`).join('');
      // 반차면 종료일 숨기기
      const isHancha = selectedType.includes('반차');
      document.getElementById('leaveEnd').closest('.flex').querySelectorAll('input, span').forEach((el,i) => {
        if (i > 0) el.style.visibility = isHancha ? 'hidden' : 'visible';
      });
      calcDays();
    }

    function selectType(val) {
      selectedType = val;
      renderTypeGrid();
    }

    // ── 일수 계산 ──
    function calcDays() {
      const start = document.getElementById('leaveStart').value;
      const end   = document.getElementById('leaveEnd').value;
      let days = 0;
      if (selectedType.includes('반차')) {
        days = 0.5;
      } else if (start && end && end >= start) {
        days = Math.floor((new Date(end) - new Date(start)) / 86400000) + 1;
      }
      document.getElementById('dayCount').textContent = days + '일';
    }

    // ── 신청 내역 렌더 ──
    function renderList() {
      const search  = document.getElementById('listSearch').value.toLowerCase();
      const sFilter = document.getElementById('listStatusFilter').value;
      const tFilter = document.getElementById('listTypeFilter').value;
      const filtered = leaves.filter(l => {
        if (search && !l.type.includes(search) && !l.reason.toLowerCase().includes(search)) return false;
        if (sFilter && l.status !== sFilter) return false;
        if (tFilter && l.type !== tFilter) return false;
        return true;
      }).sort((a,b) => b.applyDate.localeCompare(a.applyDate));

      document.getElementById('listCount').textContent = `총 ${filtered.length}건`;
      const tbody = document.getElementById('listBody');
      const empty = document.getElementById('listEmpty');
      if (!filtered.length) { tbody.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      tbody.innerHTML = filtered.map(l => {
        const tc = typeMap[l.type] || typeMap['연차'];
        const sc = statusCfg[l.status] || statusCfg['승인대기'];
        const canEdit = l.status === '승인대기';
        return `<tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
          <td class="px-3 py-3">
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-semibold" style="background:${tc.bg};color:${tc.color};">
              <i class="fa-solid ${tc.icon} text-xs"></i>${l.type}
            </span>
          </td>
          <td class="px-3 py-3 text-xs text-gray-700 whitespace-nowrap">${l.start === l.end ? l.start : l.start+' ~ '+l.end}</td>
          <td class="px-3 py-3 text-xs font-bold text-gray-700 text-center">${l.days}일</td>
          <td class="px-3 py-3 text-xs text-gray-600 max-w-[130px]"><span class="truncate block">${l.reason}</span></td>
          <td class="px-3 py-3 text-xs text-gray-500">${l.delegate || '—'}</td>
          <td class="px-3 py-3 text-xs text-gray-500 whitespace-nowrap">${l.applyDate}</td>
          <td class="px-3 py-3">
            <span class="status-badge ${sc.bg} ${sc.text} ${sc.border}">
              <span class="w-1.5 h-1.5 rounded-full ${sc.dot}"></span>${l.status}
            </span>
          </td>
          <td class="px-3 py-3 text-center">
            ${canEdit ? `<button onclick="editLeave(${l.id})" class="w-7 h-7 inline-flex items-center justify-center rounded-lg hover:bg-purple-50 text-gray-400 hover:text-purple-600 transition" title="수정"><i class="fa-regular fa-pen-to-square text-xs"></i></button>` : '<span class="text-xs text-gray-300">—</span>'}
          </td>
        </tr>`;
      }).join('');
    }

    // ── 캘린더 ──
    let calYear = 2026, calMonth = 2;

    function renderCalendar() {
      document.getElementById('calMonthLabel').textContent = `${calYear}년 ${calMonth+1}월`;
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
      const today = new Date().toISOString().slice(0,10);
      const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
      let html = '', dayNum = 1;

      for (let i=0; i<totalCells; i++) {
        const col = i % 7;
        const isOther = i < firstDay || dayNum > daysInMonth;
        const d = isOther ? '' : String(dayNum).padStart(2,'0');
        const dateStr = d ? `${calYear}-${String(calMonth+1).padStart(2,'0')}-${d}` : '';
        const isToday = dateStr === today;
        const isSun = col===0, isSat = col===6;

        const evs = dateStr ? leaves.filter(l => l.status !== '반려' && l.status !== '취소' && dateStr >= l.start && dateStr <= l.end) : [];
        const evHTML = evs.slice(0,2).map(l => {
          const tc = typeMap[l.type] || typeMap['연차'];
          return `<div class="leave-bar" style="background:${tc.barBg};color:${tc.barText};">${l.type}</div>`;
        }).join('') + (evs.length>2 ? `<p style="font-size:10px;color:#9ca3af;padding-left:4px;">+${evs.length-2}</p>` : '');

        html += `<div class="calendar-cell bg-white p-2 ${isOther?'other-month':''}">
          <span class="text-xs font-semibold ${isToday?'inline-flex w-6 h-6 rounded-full items-center justify-center text-white':isSun?'text-red-400':isSat?'text-blue-400':'text-gray-700'}" ${isToday?'style="background:#5038A6;"':''}>
            ${d}
          </span>
          ${evHTML}
        </div>`;
        if (!isOther) dayNum++;
      }
      document.getElementById('calGrid').innerHTML = html;
    }

    function prevMonth() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
    function nextMonth() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

    // ── 팀원 현황 ──
    const teamData = [
      { name:'김철수', role:'팀장', total:15, used:3,  pending:0 },
      { name:'이영희', role:'선임', total:15, used:7,  pending:1 },
      { name:'박민준', role:'주임', total:15, used:5,  pending:0 },
      { name:'최수연', role:'사원', total:12, used:2,  pending:2 },
      { name:'정하늘', role:'사원', total:12, used:9,  pending:0 },
      { name:'나현재', role:'인턴', total:5,  used:1,  pending:0 },
    ];
    const avatarColors = ['#5038A6','#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'];

    function renderTeam() {
      document.getElementById('teamList').innerHTML = teamData.map((m,i) => {
        const pct = Math.round(m.used/m.total*100);
        const remain = m.total - m.used;
        const barColor = pct>=80?'#ef4444':pct>=60?'#f59e0b':'#10b981';
        return `<div class="flex items-center gap-4 p-3 rounded-xl border border-gray-100 hover:border-gray-200 transition">
          <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style="background:${avatarColors[i%6]};">${m.name[0]}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1.5">
              <span class="text-sm font-semibold text-gray-800">${m.name}</span>
              <span class="text-xs text-gray-400">${m.role}</span>
              ${m.pending>0?`<span class="px-1.5 py-0.5 bg-blue-50 text-blue-600 text-xs rounded-md font-medium">대기 ${m.pending}건</span>`:''}
            </div>
            <div class="flex items-center gap-2">
              <div class="quota-bar flex-1"><div class="quota-bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
              <span class="text-xs text-gray-500 whitespace-nowrap">${m.used}/${m.total}일</span>
            </div>
          </div>
          <div class="text-right flex-shrink-0">
            <p class="text-xl font-bold" style="color:${remain<=3?'#ef4444':'#5038A6'};">${remain}<span class="text-xs font-normal text-gray-400 ml-0.5">일</span></p>
            <p class="text-xs text-gray-400">잔여</p>
          </div>
        </div>`;
      }).join('');
    }

    // ── 탭 전환 ──
    function switchTab(id, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-'+id).classList.remove('hidden');
      el.classList.add('active');
      if (id==='calendar') renderCalendar();
      if (id==='team') renderTeam();
    }

    // ── 신청 모달 ──
    function openApplyModal() {
      editId = null;
      selectedType = '연차';
      document.getElementById('applyModalTitle').textContent = '휴가 신청';
      document.getElementById('applyDeleteBtn').classList.add('hidden');
      const today = new Date().toISOString().slice(0,10);
      document.getElementById('leaveStart').value   = today;
      document.getElementById('leaveEnd').value     = today;
      document.getElementById('leaveReason').value  = '';
      document.getElementById('leaveDelegate').value = '';
      renderTypeGrid();
      document.getElementById('applyModal').classList.remove('hidden');
    }

    function editLeave(id) {
      editId = id;
      const l = leaves.find(x => x.id === id);
      if (!l) return;
      selectedType = l.type;
      document.getElementById('applyModalTitle').textContent = '신청 수정';
      document.getElementById('applyDeleteBtn').classList.remove('hidden');
      document.getElementById('leaveStart').value    = l.start;
      document.getElementById('leaveEnd').value      = l.end;
      document.getElementById('leaveReason').value   = l.reason;
      document.getElementById('leaveDelegate').value = l.delegate;
      renderTypeGrid();
      document.getElementById('applyModal').classList.remove('hidden');
    }

    function closeApplyModal() {
      document.getElementById('applyModal').classList.add('hidden');
      editId = null;
    }

    function submitLeave() {
      const start  = document.getElementById('leaveStart').value;
      const end    = document.getElementById('leaveEnd').value;
      const reason = document.getElementById('leaveReason').value.trim();
      if (!start || !reason) { alert('필수 항목을 입력하세요.'); return; }
      const daysStr = document.getElementById('dayCount').textContent;
      const days    = parseFloat(daysStr);
      const isHancha = selectedType.includes('반차');

      const data = {
        type: selectedType,
        start,
        end: isHancha ? start : end,
        days,
        reason,
        delegate: document.getElementById('leaveDelegate').value,
        applyDate: new Date().toISOString().slice(0,10),
        status: '승인대기',
        note: '',
      };

      if (editId) {
        const idx = leaves.findIndex(l => l.id === editId);
        if (idx > -1) leaves[idx] = { ...leaves[idx], ...data };
      } else {
        leaves.push({ id: nextId++, ...data });
      }
      closeApplyModal();
      renderList();
    }

    function cancelLeave() {
      if (!confirm('해당 신청을 취소 요청하시겠습니까?')) return;
      const idx = leaves.findIndex(l => l.id === editId);
      if (idx > -1) leaves[idx].status = '취소';
      closeApplyModal();
      renderList();
    }

    // ── Init ──
    renderList();
    renderTypeGrid();
  </script>
</body>
</html>
