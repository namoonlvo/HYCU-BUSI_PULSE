<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/meta :: meta}"></th:block>
  <title>Busi Pulse | 나의 업무</title>
  <style>
    .status-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500;border-width:1px;}
    .progress-bar{height:5px;border-radius:3px;background:#e5e7eb;overflow:hidden;}
    .progress-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
    .filter-chip{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid #e5e7eb;}
    .filter-chip.active{background:#5038A6;color:#fff;border-color:#5038A6;}
    .filter-chip:not(.active){background:#fff;color:#6b7280;}
    .filter-chip:not(.active):hover{border-color:#5038A6;color:#5038A6;}
    .task-card{transition:all .2s;cursor:pointer;}
    .task-card:hover{box-shadow:0 6px 18px rgba(80,56,166,.1);border-color:#c4b5fd;}
    .tab-btn{padding:10px 16px;font-size:13px;font-weight:500;border-bottom:2px solid transparent;color:#9ca3af;cursor:pointer;transition:all .15s;}
    .tab-btn.active{border-bottom-color:#5038A6;color:#5038A6;font-weight:600;}
    .priority-pill{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;}
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <th:block th:replace="~{fragments/header :: sidebar}"></th:block>
  <div id="main-wrapper" class="min-h-screen flex flex-col transition-all duration-300">
    <th:block th:replace="~{fragments/header :: gnb-header}"></th:block>
    <main class="flex-1 p-6 space-y-5">
      <div class="flex items-center justify-between">
        <div><h1 class="text-xl font-bold text-gray-800">나의 업무</h1><p class="text-sm text-gray-500 mt-0.5">나에게 할당된 업무를 확인하고 진척을 관리하세요.</p></div>
        <button onclick="openModal('create')" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-white shadow-sm hover:shadow-md transition-all" style="background:#5038A6;"><i class="fa-solid fa-plus text-xs"></i> 업무 추가</button>
      </div>

      <!-- 요약 -->
      <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3"><div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:rgba(80,56,166,.1);"><i class="fa-solid fa-list-check text-sm" style="color:#5038A6;"></i></div><div><p class="text-xl font-bold text-gray-800" id="cntAll">0</p><p class="text-xs text-gray-500">전체</p></div></div>
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-blue-50 flex items-center justify-center"><i class="fa-solid fa-spinner text-sm text-blue-500"></i></div><div><p class="text-xl font-bold text-gray-800" id="cntProgress">0</p><p class="text-xs text-gray-500">진행 중</p></div></div>
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-emerald-50 flex items-center justify-center"><i class="fa-solid fa-circle-check text-sm text-emerald-500"></i></div><div><p class="text-xl font-bold text-gray-800" id="cntDone">0</p><p class="text-xs text-gray-500">완료</p></div></div>
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-red-50 flex items-center justify-center"><i class="fa-solid fa-triangle-exclamation text-sm text-red-500"></i></div><div><p class="text-xl font-bold text-gray-800" id="cntDelay">0</p><p class="text-xs text-gray-500">지연</p></div></div>
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-amber-50 flex items-center justify-center"><i class="fa-solid fa-flag text-sm text-amber-500"></i></div><div><p class="text-xl font-bold text-gray-800" id="cntHigh">0</p><p class="text-xs text-gray-500">높음 우선순위</p></div></div>
      </div>

      <!-- 필터 -->
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-wrap items-center gap-3">
        <div class="relative flex-1 min-w-[160px] max-w-xs"><i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i><input type="text" id="searchInput" placeholder="업무명 검색..." oninput="render()" class="w-full pl-8 pr-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400"></div>
        <div class="flex gap-1.5 flex-wrap">
          <button class="filter-chip active" data-val="all" onclick="setFilter('all',this)">전체</button>
          <button class="filter-chip" data-val="진행중" onclick="setFilter('진행중',this)">진행 중</button>
          <button class="filter-chip" data-val="완료" onclick="setFilter('완료',this)">완료</button>
          <button class="filter-chip" data-val="지연" onclick="setFilter('지연',this)">지연</button>
          <button class="filter-chip" data-val="예정" onclick="setFilter('예정',this)">예정</button>
        </div>
        <select id="projFilter" onchange="render()" class="px-3 py-2 text-xs rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
          <option value="">프로젝트 전체</option><option>ERP 고도화 프로젝트</option><option>모바일 앱 리뉴얼</option><option>데이터 분석 플랫폼</option><option>인프라 클라우드 전환</option>
        </select>
        <select id="sortSel" onchange="render()" class="px-3 py-2 text-xs rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
          <option value="dueAsc">마감일 오름차순</option><option value="dueDesc">마감일 내림차순</option><option value="priority">우선순위</option><option value="progress">진척도</option>
        </select>
        <span class="ml-auto text-xs text-gray-400" id="rowCount"></span>
      </div>

      <!-- 탭 콘텐츠 -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="flex border-b border-gray-100 px-4">
          <button class="tab-btn active" onclick="switchTab('list',this)">리스트</button>
          <button class="tab-btn" onclick="switchTab('kanban',this)">칸반</button>
        </div>
        <div id="tab-list">
          <table class="w-full text-sm">
            <thead><tr class="bg-gray-50 border-b border-gray-100">
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500">업무명</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-28">프로젝트</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-20">상태</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-16">우선순위</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-24">마감일</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-32">진척도</th>
              <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 w-14">액션</th>
            </tr></thead>
            <tbody id="listBody"></tbody>
          </table>
          <div id="listEmpty" class="hidden py-14 text-center"><i class="fa-solid fa-inbox text-gray-300 text-3xl block mb-2"></i><p class="text-sm text-gray-400">업무가 없습니다</p></div>
        </div>
        <div id="tab-kanban" class="hidden p-4">
          <div class="grid grid-cols-4 gap-4" id="kanbanBoard"></div>
        </div>
      </div>
    </main>
  </div>
  <div id="overlay" class="fixed inset-0 bg-black/20 z-20 hidden" onclick="closeAllPanels()"></div>

  <!-- 모달 -->
  <div id="taskModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 sticky top-0 bg-white z-10">
        <h2 class="text-base font-bold text-gray-800" id="modalTitle">업무 추가</h2>
        <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="block text-xs font-semibold text-gray-600 mb-1.5">업무명 <span class="text-red-400">*</span></label><input type="text" id="mName" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-100 transition"></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-xs font-semibold text-gray-600 mb-1.5">프로젝트</label><select id="mProject" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400"><option value="">없음</option><option>ERP 고도화 프로젝트</option><option>모바일 앱 리뉴얼</option><option>데이터 분석 플랫폼</option><option>인프라 클라우드 전환</option></select></div>
          <div><label class="block text-xs font-semibold text-gray-600 mb-1.5">상태</label><select id="mStatus" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400"><option>예정</option><option>진행중</option><option>완료</option><option>지연</option></select></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-xs font-semibold text-gray-600 mb-1.5">우선순위</label><select id="mPriority" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400"><option>높음</option><option selected>보통</option><option>낮음</option></select></div>
          <div><label class="block text-xs font-semibold text-gray-600 mb-1.5">마감일</label><input type="date" id="mDue" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400"></div>
        </div>
        <div><label class="block text-xs font-semibold text-gray-600 mb-1.5">진척도 (%)</label><div class="flex items-center gap-3"><input type="range" id="mProgress" min="0" max="100" value="0" oninput="document.getElementById('mProgressVal').textContent=this.value+'%'" class="flex-1" style="accent-color:#5038A6;"><span class="text-xs font-bold text-purple-600 w-8" id="mProgressVal">0%</span></div></div>
        <div><label class="block text-xs font-semibold text-gray-600 mb-1.5">메모</label><textarea id="mMemo" rows="2" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400 resize-none"></textarea></div>
      </div>
      <div class="px-6 py-4 border-t border-gray-100 flex items-center sticky bottom-0 bg-white">
        <button id="deleteBtn" onclick="deleteTask()" class="hidden items-center gap-2 px-4 py-2 text-sm font-medium text-red-500 hover:bg-red-50 rounded-lg transition"><i class="fa-regular fa-trash-can"></i> 삭제</button>
        <div class="flex gap-2 ml-auto"><button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition">취소</button><button onclick="saveTask()" class="flex items-center gap-2 px-5 py-2 text-sm font-semibold text-white rounded-lg shadow-sm hover:shadow transition" style="background:#5038A6;"><i class="fa-solid fa-floppy-disk text-xs"></i> 저장</button></div>
      </div>
    </div>
  </div>

  <script th:src="@{/js/common.js}"></script>
  <script>
    let tasks=[
      {id:1,name:'ERP 화면 UI 개선',        project:'ERP 고도화 프로젝트', status:'진행중',priority:'높음',due:'2026-03-28',progress:60,memo:''},
      {id:2,name:'API 연동 테스트',          project:'모바일 앱 리뉴얼',    status:'지연',  priority:'높음',due:'2026-03-20',progress:30,memo:'백엔드 응답 오류 확인 필요'},
      {id:3,name:'DB 인덱스 최적화',         project:'ERP 고도화 프로젝트', status:'완료',  priority:'보통',due:'2026-03-15',progress:100,memo:''},
      {id:4,name:'분기 보고서 작성',         project:'',                    status:'진행중',priority:'보통',due:'2026-03-25',progress:50,memo:'팀장 제출용'},
      {id:5,name:'iOS 푸시 알림 구현',       project:'모바일 앱 리뉴얼',    status:'진행중',priority:'높음',due:'2026-03-30',progress:40,memo:''},
      {id:6,name:'클라우드 IAM 설정',        project:'인프라 클라우드 전환',status:'지연',  priority:'높음',due:'2026-03-22',progress:20,memo:'권한 정책 검토 중'},
      {id:7,name:'데이터 파이프라인 설계',   project:'데이터 분석 플랫폼',  status:'예정',  priority:'보통',due:'2026-04-05',progress:0, memo:''},
      {id:8,name:'QA 테스트 케이스 작성',    project:'ERP 고도화 프로젝트', status:'예정',  priority:'낮음',due:'2026-04-10',progress:0, memo:''},
    ];
    let nextId=9,editId=null,currentFilter='all',currentTab='list';
    const scfg={'진행중':{text:'text-blue-700',bg:'bg-blue-50',border:'border-blue-200',dot:'bg-blue-400'},'완료':{text:'text-emerald-700',bg:'bg-emerald-50',border:'border-emerald-200',dot:'bg-emerald-400'},'지연':{text:'text-red-700',bg:'bg-red-50',border:'border-red-200',dot:'bg-red-400'},'예정':{text:'text-gray-600',bg:'bg-gray-100',border:'border-gray-200',dot:'bg-gray-400'}};
    const pcolor={'높음':'#ef4444','보통':'#f59e0b','낮음':'#d1d5db'};
    const pcText={'높음':'text-red-500','보통':'text-amber-500','낮음':'text-gray-400'};
    const progColor=p=>p>=80?'#10b981':p>=50?'#5038A6':p>=30?'#f59e0b':'#ef4444';

    function getFiltered(){
      const s=document.getElementById('searchInput').value.toLowerCase();
      const proj=document.getElementById('projFilter').value;
      const sort=document.getElementById('sortSel').value;
      return tasks.filter(t=>{
        if(currentFilter!=='all'&&t.status!==currentFilter)return false;
        if(s&&!t.name.toLowerCase().includes(s))return false;
        if(proj&&t.project!==proj)return false;
        return true;
      }).sort((a,b)=>{
        if(sort==='dueAsc')return a.due.localeCompare(b.due);
        if(sort==='dueDesc')return b.due.localeCompare(a.due);
        if(sort==='priority'){const o={'높음':0,'보통':1,'낮음':2};return o[a.priority]-o[b.priority];}
        if(sort==='progress')return b.progress-a.progress;
        return 0;
      });
    }
    function updateCounts(){
      document.getElementById('cntAll').textContent=tasks.length;
      document.getElementById('cntProgress').textContent=tasks.filter(t=>t.status==='진행중').length;
      document.getElementById('cntDone').textContent=tasks.filter(t=>t.status==='완료').length;
      document.getElementById('cntDelay').textContent=tasks.filter(t=>t.status==='지연').length;
      document.getElementById('cntHigh').textContent=tasks.filter(t=>t.priority==='높음').length;
    }
    function render(){updateCounts();if(currentTab==='list')renderList();else renderKanban();}
    function renderList(){
      const filtered=getFiltered();
      document.getElementById('rowCount').textContent=`총 ${filtered.length}건`;
      const tbody=document.getElementById('listBody'),empty=document.getElementById('listEmpty');
      if(!filtered.length){tbody.innerHTML='';empty.classList.remove('hidden');return;}
      empty.classList.add('hidden');
      const today=new Date().toISOString().slice(0,10);
      tbody.innerHTML=filtered.map(t=>{
        const sc=scfg[t.status]||scfg['예정'];
        const pc=progColor(t.progress);
        const overdue=t.status!=='완료'&&t.due<today;
        return`<tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
          <td class="px-4 py-3"><div class="flex items-center gap-2"><div class="priority-pill" style="background:${pcolor[t.priority]||'#d1d5db'};min-height:32px;"></div><div><p class="font-medium text-gray-800 text-sm">${t.name}</p>${t.memo?`<p class="text-xs text-gray-400 mt-0.5">${t.memo}</p>`:''}</div></div></td>
          <td class="px-4 py-3 text-xs text-gray-500"><span class="truncate block max-w-[100px]">${t.project||'—'}</span></td>
          <td class="px-4 py-3"><span class="status-badge ${sc.bg} ${sc.text} ${sc.border}"><span class="w-1.5 h-1.5 rounded-full ${sc.dot}"></span>${t.status}</span></td>
          <td class="px-4 py-3 text-xs font-semibold ${pcText[t.priority]}">${t.priority}</td>
          <td class="px-4 py-3 text-xs ${overdue?'text-red-500 font-semibold':'text-gray-600'}">${t.due}${overdue?' ⚠':''}</td>
          <td class="px-4 py-3"><div class="flex items-center gap-2"><div class="progress-bar w-16"><div class="progress-bar-fill" style="width:${t.progress}%;background:${pc};"></div></div><span class="text-xs font-bold" style="color:${pc};">${t.progress}%</span></div></td>
          <td class="px-4 py-3 text-center"><button onclick="openModal('edit',${t.id})" class="w-7 h-7 inline-flex items-center justify-center rounded-lg hover:bg-purple-50 text-gray-400 hover:text-purple-600 transition"><i class="fa-regular fa-pen-to-square text-xs"></i></button></td>
        </tr>`;
      }).join('');
    }
    function renderKanban(){
      const cols=['예정','진행중','완료','지연'];
      const cc={'예정':{c:'#9ca3af'},'진행중':{c:'#3b82f6'},'완료':{c:'#10b981'},'지연':{c:'#ef4444'}};
      document.getElementById('kanbanBoard').innerHTML=cols.map(col=>{
        const items=tasks.filter(t=>t.status===col);
        return`<div class="flex flex-col gap-2"><div class="flex items-center justify-between mb-1"><span class="text-xs font-bold text-gray-600 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background:${cc[col].c};"></span>${col}</span><span class="text-xs text-gray-400">${items.length}</span></div>
        ${items.map(t=>{const pc=progColor(t.progress);return`<div class="task-card bg-white rounded-xl border border-gray-100 p-3 shadow-sm" onclick="openModal('edit',${t.id})"><div class="flex items-start gap-2 mb-2"><div class="w-1 rounded-full flex-shrink-0 self-stretch" style="background:${pcolor[t.priority]};"></div><p class="text-xs font-semibold text-gray-800 leading-tight flex-1">${t.name}</p></div>${t.project?`<p class="text-xs text-gray-400 mb-2 truncate">${t.project}</p>`:''}<div class="flex items-center gap-2"><div class="progress-bar flex-1"><div class="progress-bar-fill" style="width:${t.progress}%;background:${pc};"></div></div><span class="text-xs font-bold" style="color:${pc};">${t.progress}%</span></div><p class="text-xs text-gray-400 mt-2">${t.due}</p></div>`;}).join('')}
        </div>`;
      }).join('');
    }
    function switchTab(tab,el){
      currentTab=tab;
      document.getElementById('tab-list').classList.toggle('hidden',tab!=='list');
      document.getElementById('tab-kanban').classList.toggle('hidden',tab!=='kanban');
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      el.classList.add('active');render();
    }
    function setFilter(val,el){currentFilter=val;document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
    function openModal(mode,id=null){
      editId=(mode==='edit')?id:null;
      document.getElementById('modalTitle').textContent=mode==='create'?'업무 추가':'업무 수정';
      document.getElementById('deleteBtn').classList.toggle('hidden',mode==='create');
      document.getElementById('taskModal').classList.remove('hidden');
      if(mode==='create'){
        document.getElementById('mName').value='';document.getElementById('mMemo').value='';
        document.getElementById('mStatus').value='예정';document.getElementById('mPriority').value='보통';document.getElementById('mProject').value='';
        document.getElementById('mDue').value=new Date().toISOString().slice(0,10);
        document.getElementById('mProgress').value='0';document.getElementById('mProgressVal').textContent='0%';
      }else{
        const t=tasks.find(x=>x.id===id);if(!t)return;
        document.getElementById('mName').value=t.name;document.getElementById('mStatus').value=t.status;
        document.getElementById('mPriority').value=t.priority;document.getElementById('mProject').value=t.project;
        document.getElementById('mDue').value=t.due;document.getElementById('mProgress').value=t.progress;
        document.getElementById('mProgressVal').textContent=t.progress+'%';document.getElementById('mMemo').value=t.memo;
      }
    }
    function closeModal(){document.getElementById('taskModal').classList.add('hidden');editId=null;}
    function saveTask(){
      const name=document.getElementById('mName').value.trim();if(!name){alert('업무명을 입력하세요.');return;}
      const data={name,project:document.getElementById('mProject').value,status:document.getElementById('mStatus').value,priority:document.getElementById('mPriority').value,due:document.getElementById('mDue').value,progress:parseInt(document.getElementById('mProgress').value),memo:document.getElementById('mMemo').value};
      if(editId){const i=tasks.findIndex(t=>t.id===editId);if(i>-1)tasks[i]={...tasks[i],...data};}else tasks.push({id:nextId++,...data});
      closeModal();render();
    }
    function deleteTask(){if(!confirm('삭제하시겠습니까?'))return;tasks=tasks.filter(t=>t.id!==editId);closeModal();render();}
    render();
  </script>
</body>
</html>
