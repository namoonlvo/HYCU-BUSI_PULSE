<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/meta :: meta}"></th:block>
  <title>Busi Pulse | 프로젝트 문서</title>
  <style>
    .doc-card { transition:all 0.2s; cursor:pointer; }
    .doc-card:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(80,56,166,0.1); border-color:#c4b5fd; }
    .filter-chip { padding:5px 12px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; border:1px solid #e5e7eb; }
    .filter-chip.active { background:#5038A6; color:#fff; border-color:#5038A6; }
    .filter-chip:not(.active) { background:#fff; color:#6b7280; }
    .filter-chip:not(.active):hover { border-color:#5038A6; color:#5038A6; }
    .view-btn { padding:6px 10px; border-radius:8px; border:1px solid #e5e7eb; color:#6b7280; transition:all 0.15s; cursor:pointer; }
    .view-btn.active { background:#5038A6; color:#fff; border-color:#5038A6; }
    .drop-zone { border:2px dashed #e5e7eb; transition:all 0.2s; }
    .drop-zone.dragover { border-color:#5038A6; background:rgba(80,56,166,0.04); }
  </style>
</head>
<body class="bg-gray-50 font-sans">

  <th:block th:replace="~{fragments/header :: sidebar}"></th:block>

  <div id="main-wrapper" class="min-h-screen flex flex-col transition-all duration-300">
    <th:block th:replace="~{fragments/header :: gnb-header}"></th:block>

    <main class="flex-1 p-6 space-y-5">

      <!-- Title -->
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold text-gray-800">프로젝트 문서</h1>
          <p class="text-sm text-gray-500 mt-0.5">프로젝트별 산출물 및 문서를 관리하세요.</p>
        </div>
        <button onclick="openUploadModal()" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-white shadow-sm hover:shadow-md transition-all" style="background:#5038A6;">
          <i class="fa-solid fa-cloud-arrow-up text-xs"></i> 문서 업로드
        </button>
      </div>

      <!-- 요약 카드 -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:rgba(80,56,166,0.1);">
            <i class="fa-solid fa-file-lines text-sm" style="color:#5038A6;"></i>
          </div>
          <div><p class="text-2xl font-bold text-gray-800" id="cntTotal">0</p><p class="text-xs text-gray-500">전체 문서</p></div>
        </div>
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-red-50">
            <i class="fa-solid fa-file-pdf text-sm text-red-500"></i>
          </div>
          <div><p class="text-2xl font-bold text-gray-800" id="cntPdf">0</p><p class="text-xs text-gray-500">PDF</p></div>
        </div>
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-blue-50">
            <i class="fa-solid fa-file-word text-sm text-blue-500"></i>
          </div>
          <div><p class="text-2xl font-bold text-gray-800" id="cntOffice">0</p><p class="text-xs text-gray-500">Office</p></div>
        </div>
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-emerald-50">
            <i class="fa-solid fa-file-image text-sm text-emerald-500"></i>
          </div>
          <div><p class="text-2xl font-bold text-gray-800" id="cntEtc">0</p><p class="text-xs text-gray-500">기타</p></div>
        </div>
      </div>

      <!-- 필터 바 -->
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-wrap items-center gap-3">
        <div class="relative flex-1 min-w-[180px] max-w-xs">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
          <input type="text" id="searchInput" placeholder="문서명 또는 업로더 검색..." oninput="applyFilter()"
            class="w-full pl-8 pr-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
        </div>
        <!-- 프로젝트 필터 -->
        <select id="projectFilter" onchange="applyFilter()" class="px-3 py-2 text-xs rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
          <option value="">프로젝트 전체</option>
          <option value="ERP 고도화 프로젝트">ERP 고도화</option>
          <option value="모바일 앱 리뉴얼">모바일 앱 리뉴얼</option>
          <option value="데이터 분석 플랫폼">데이터 분석 플랫폼</option>
          <option value="인프라 클라우드 전환">인프라 클라우드 전환</option>
        </select>
        <!-- 유형 칩 -->
        <div class="flex gap-1.5 flex-wrap">
          <button class="filter-chip active" data-val="all" onclick="setTypeFilter('all',this)">전체</button>
          <button class="filter-chip" data-val="pdf" onclick="setTypeFilter('pdf',this)">PDF</button>
          <button class="filter-chip" data-val="office" onclick="setTypeFilter('office',this)">Office</button>
          <button class="filter-chip" data-val="image" onclick="setTypeFilter('image',this)">이미지</button>
          <button class="filter-chip" data-val="etc" onclick="setTypeFilter('etc',this)">기타</button>
        </div>
        <!-- 뷰 전환 -->
        <div class="flex gap-1 ml-auto">
          <button class="view-btn active" id="btnCard" onclick="setView('card')"><i class="fa-solid fa-grip text-sm"></i></button>
          <button class="view-btn" id="btnList" onclick="setView('list')"><i class="fa-solid fa-list text-sm"></i></button>
        </div>
        <span class="text-xs text-gray-400" id="rowCount"></span>
      </div>

      <!-- 카드 뷰 -->
      <div id="cardView" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4"></div>

      <!-- 리스트 뷰 -->
      <div id="listView" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100">
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500">파일명</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-28">프로젝트</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-20">분류</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-16">크기</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-20">버전</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-24">업로더</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 w-28">업로드일</th>
              <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 w-20">액션</th>
            </tr>
          </thead>
          <tbody id="listBody"></tbody>
        </table>
        <div id="listEmpty" class="hidden py-16 text-center">
          <i class="fa-solid fa-folder-open text-gray-300 text-3xl block mb-3"></i>
          <p class="text-sm text-gray-400">문서가 없습니다</p>
        </div>
      </div>
      <div id="cardEmpty" class="hidden py-20 text-center">
        <i class="fa-solid fa-folder-open text-gray-300 text-4xl block mb-3"></i>
        <p class="text-sm text-gray-400">조건에 맞는 문서가 없습니다</p>
      </div>

    </main>
  </div>

  <div id="overlay" class="fixed inset-0 bg-black/20 z-20 hidden" onclick="closeAllPanels()"></div>

  <!-- 업로드 모달 -->
  <div id="uploadModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeUploadModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h2 class="text-base font-bold text-gray-800" id="uploadModalTitle">문서 업로드</h2>
        <button onclick="closeUploadModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition text-gray-400">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <!-- 드래그앤드롭 영역 -->
        <div class="drop-zone rounded-xl p-8 text-center" id="dropZone"
          ondragover="event.preventDefault();this.classList.add('dragover')"
          ondragleave="this.classList.remove('dragover')"
          ondrop="handleDrop(event)">
          <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-300 block mb-2"></i>
          <p class="text-sm font-medium text-gray-500">파일을 여기에 드래그하거나</p>
          <label class="cursor-pointer mt-2 inline-block px-4 py-2 text-xs font-semibold rounded-lg text-white" style="background:#5038A6;">
            파일 선택
            <input type="file" class="hidden" id="fileInput" onchange="handleFileSelect(this)">
          </label>
          <p id="selectedFile" class="text-xs text-gray-400 mt-2"></p>
        </div>
        <!-- 문서 정보 -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">문서명 <span class="text-red-400">*</span></label>
          <input type="text" id="uName" placeholder="문서명을 입력하세요"
            class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-100 transition">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5">프로젝트 <span class="text-red-400">*</span></label>
            <select id="uProject" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
              <option value="">선택</option>
              <option value="ERP 고도화 프로젝트">ERP 고도화 프로젝트</option>
              <option value="모바일 앱 리뉴얼">모바일 앱 리뉴얼</option>
              <option value="데이터 분석 플랫폼">데이터 분석 플랫폼</option>
              <option value="인프라 클라우드 전환">인프라 클라우드 전환</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5">문서 분류</label>
            <select id="uCategory" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
              <option value="기획">기획</option>
              <option value="설계">설계</option>
              <option value="개발">개발</option>
              <option value="테스트">테스트</option>
              <option value="회의록">회의록</option>
              <option value="보고서">보고서</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5">버전</label>
            <input type="text" id="uVersion" value="v1.0" placeholder="v1.0"
              class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5">접근 권한</label>
            <select id="uAccess" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400">
              <option value="전체">전체 공개</option>
              <option value="팀내">팀 내부</option>
              <option value="관리자">관리자만</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">설명</label>
          <textarea id="uDesc" rows="2" placeholder="문서에 대한 간략한 설명..."
            class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-purple-400 resize-none transition"></textarea>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-gray-100 flex items-center">
        <button id="uDeleteBtn" onclick="deleteDoc()" class="hidden items-center gap-2 px-4 py-2 text-sm font-medium text-red-500 hover:bg-red-50 rounded-lg transition">
          <i class="fa-regular fa-trash-can"></i> 삭제
        </button>
        <div class="flex gap-2 ml-auto">
          <button onclick="closeUploadModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition">취소</button>
          <button onclick="saveDoc()" class="flex items-center gap-2 px-5 py-2 text-sm font-semibold text-white rounded-lg shadow-sm hover:shadow transition" style="background:#5038A6;">
            <i class="fa-solid fa-cloud-arrow-up text-xs"></i> 업로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 상세 보기 모달 -->
  <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDetailModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h2 class="text-base font-bold text-gray-800" id="detailTitle">문서 상세</h2>
        <button onclick="closeDetailModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition text-gray-400">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="px-6 py-5" id="detailBody"></div>
      <div class="px-6 py-4 border-t border-gray-100 flex justify-between">
        <button onclick="editDoc(currentDetailId)" class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-600 border border-gray-200 rounded-lg hover:border-purple-300 hover:text-purple-600 transition">
          <i class="fa-regular fa-pen-to-square text-xs"></i> 수정
        </button>
        <button class="flex items-center gap-2 px-5 py-2 text-sm font-semibold text-white rounded-lg shadow-sm hover:shadow transition" style="background:#5038A6;">
          <i class="fa-solid fa-download text-xs"></i> 다운로드
        </button>
      </div>
    </div>
  </div>

  <script th:src="@{/js/common.js}"></script>
  <script>

    const catColors = {
      '기획':'bg-purple-100 text-purple-700', '설계':'bg-blue-100 text-blue-700',
      '개발':'bg-emerald-100 text-emerald-700','테스트':'bg-amber-100 text-amber-700',
      '회의록':'bg-cyan-100 text-cyan-700','보고서':'bg-red-100 text-red-700','기타':'bg-gray-100 text-gray-600',
    };

    function getFiltered() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const proj   = document.getElementById('projectFilter').value;
      return docs.filter(d => {
        if (search && !d.name.toLowerCase().includes(search) && !d.uploader.toLowerCase().includes(search)) return false;
        if (proj && d.project !== proj) return false;
        if (typeFilter !== 'all') {
          const g = (extConfig[d.ext] || defExt).group;
          if (g !== typeFilter) return false;
        }
        return true;
      });
    }

    function updateCounts(all) {
      document.getElementById('cntTotal').textContent = all.length;
      document.getElementById('cntPdf').textContent   = all.filter(d=>(extConfig[d.ext]||defExt).group==='pdf').length;
      document.getElementById('cntOffice').textContent= all.filter(d=>(extConfig[d.ext]||defExt).group==='office').length;
      document.getElementById('cntEtc').textContent   = all.filter(d=>!['pdf','office'].includes((extConfig[d.ext]||defExt).group)).length;
    }

    function renderCards() {
      const filtered = getFiltered();
      updateCounts(docs);
      document.getElementById('rowCount').textContent = `총 ${filtered.length}건`;
      const cv = document.getElementById('cardView');
      const ce = document.getElementById('cardEmpty');
      if (!filtered.length) { cv.innerHTML=''; ce.classList.remove('hidden'); return; }
      ce.classList.add('hidden');

      cv.innerHTML = filtered.map(d => {
        const ec = extConfig[d.ext] || defExt;
        const cc = catColors[d.category] || catColors['기타'];
        return `<div class="doc-card bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col gap-3" onclick="openDetailModal(${d.id})">
          <div class="flex items-start justify-between gap-2">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0" style="background:${ec.bg};">
              <i class="fa-solid ${ec.icon} text-xl" style="color:${ec.color};"></i>
            </div>
            <div class="flex flex-col items-end gap-1">
              <span class="text-xs px-2 py-0.5 rounded-md font-medium ${cc}">${d.category}</span>
              <span class="text-xs text-gray-400">${ec.label} · ${d.version}</span>
            </div>
          </div>
          <div>
            <p class="font-semibold text-gray-800 text-sm leading-tight line-clamp-2">${d.name}</p>
            <p class="text-xs text-gray-400 mt-1 line-clamp-1">${d.desc}</p>
          </div>
          <div class="border-t border-gray-50 pt-3 flex items-center justify-between text-xs text-gray-400">
            <span class="flex items-center gap-1"><i class="fa-regular fa-user text-xs"></i>${d.uploader}</span>
            <span>${d.uploadDate}</span>
            <span class="font-medium text-gray-500">${d.size}</span>
          </div>
          <div class="text-xs text-gray-400 truncate">${d.project}</div>
        </div>`;
      }).join('');
    }

    function renderListView() {
      const filtered = getFiltered();
      updateCounts(docs);
      document.getElementById('rowCount').textContent = `총 ${filtered.length}건`;
      const tbody = document.getElementById('listBody');
      const empty = document.getElementById('listEmpty');
      if (!filtered.length) { tbody.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      tbody.innerHTML = filtered.map(d => {
        const ec = extConfig[d.ext] || defExt;
        const cc = catColors[d.category] || catColors['기타'];
        return `<tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors cursor-pointer" onclick="openDetailModal(${d.id})">
          <td class="px-4 py-3">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:${ec.bg};">
                <i class="fa-solid ${ec.icon} text-sm" style="color:${ec.color};"></i>
              </div>
              <div>
                <p class="font-medium text-gray-800 text-sm">${d.name}</p>
                <p class="text-xs text-gray-400 line-clamp-1">${d.desc}</p>
              </div>
            </div>
          </td>
          <td class="px-4 py-3 text-xs text-gray-600 max-w-[100px]"><span class="truncate block">${d.project}</span></td>
          <td class="px-4 py-3"><span class="text-xs px-2 py-0.5 rounded-md font-medium ${cc}">${d.category}</span></td>
          <td class="px-4 py-3 text-xs text-gray-500">${d.size}</td>
          <td class="px-4 py-3 text-xs text-gray-500">${d.version}</td>
          <td class="px-4 py-3 text-xs text-gray-600">${d.uploader}</td>
          <td class="px-4 py-3 text-xs text-gray-500 whitespace-nowrap">${d.uploadDate}</td>
          <td class="px-4 py-3 text-center">
            <div class="flex items-center justify-center gap-1" onclick="event.stopPropagation()">
              <button onclick="editDoc(${d.id})" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-purple-50 text-gray-400 hover:text-purple-600 transition">
                <i class="fa-regular fa-pen-to-square text-xs"></i>
              </button>
              <button class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-blue-50 text-gray-400 hover:text-blue-500 transition" title="다운로드">
                <i class="fa-solid fa-download text-xs"></i>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function render() {
      if (currentView === 'card') renderCards(); else renderListView();
    }

    function applyFilter() { render(); }

    function setTypeFilter(val, el) {
      typeFilter = val;
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function setView(v) {
      currentView = v;
      document.getElementById('cardView').classList.toggle('hidden', v !== 'card');
      document.getElementById('listView').classList.toggle('hidden', v !== 'list');
      document.getElementById('cardEmpty').classList.add('hidden');
      document.getElementById('btnCard').classList.toggle('active', v === 'card');
      document.getElementById('btnList').classList.toggle('active', v === 'list');
      render();
    }

    // ── 업로드 모달 ──
    function openUploadModal() {
      editDocId = null;
      document.getElementById('uploadModalTitle').textContent = '문서 업로드';
      document.getElementById('uDeleteBtn').classList.add('hidden');
      document.getElementById('uploadModal').classList.remove('hidden');
      ['uName','uVersion','uDesc'].forEach(i => document.getElementById(i).value = i==='uVersion'?'v1.0':'');
      document.getElementById('uProject').value   = '';
      document.getElementById('uCategory').value  = '기획';
      document.getElementById('uAccess').value    = '전체';
      document.getElementById('selectedFile').textContent = '';
    }

    function editDoc(id) {
      closeDetailModal();
      editDocId = id;
      const d = docs.find(x => x.id === id);
      if (!d) return;
      document.getElementById('uploadModalTitle').textContent = '문서 수정';
      document.getElementById('uDeleteBtn').classList.remove('hidden');
      document.getElementById('uName').value      = d.name;
      document.getElementById('uProject').value   = d.project;
      document.getElementById('uCategory').value  = d.category;
      document.getElementById('uVersion').value   = d.version;
      document.getElementById('uAccess').value    = d.access;
      document.getElementById('uDesc').value      = d.desc;
      document.getElementById('selectedFile').textContent = d.name + '.' + d.ext;
      document.getElementById('uploadModal').classList.remove('hidden');
    }

    function closeUploadModal() {
      document.getElementById('uploadModal').classList.add('hidden');
      editDocId = null;
    }

    function handleFileSelect(input) {
      const file = input.files[0];
      if (file) document.getElementById('selectedFile').textContent = file.name + ' (' + (file.size/1024).toFixed(0) + 'KB)';
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('dropZone').classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) {
        document.getElementById('selectedFile').textContent = file.name;
        if (!document.getElementById('uName').value) {
          document.getElementById('uName').value = file.name.replace(/\.[^.]+$/, '');
        }
      }
    }

    function saveDoc() {
      const name = document.getElementById('uName').value.trim();
      const proj = document.getElementById('uProject').value;
      if (!name || !proj) { alert('문서명과 프로젝트를 입력하세요.'); return; }
      const data = {
        name, project: proj,
        ext:        (document.getElementById('selectedFile').textContent.split('.').pop().split(' ')[0] || 'docx').toLowerCase(),
        category:   document.getElementById('uCategory').value,
        version:    document.getElementById('uVersion').value || 'v1.0',
        access:     document.getElementById('uAccess').value,
        desc:       document.getElementById('uDesc').value,
        size:       '—',
        uploader:   '나',
        uploadDate: new Date().toISOString().slice(0,10),
      };
      if (editDocId) {
        const idx = docs.findIndex(d => d.id === editDocId);
        if (idx > -1) docs[idx] = { ...docs[idx], ...data };
      } else {
        docs.push({ id: nextId++, ...data });
      }
      closeUploadModal();
      render();
    }

    function deleteDoc() {
      if (!confirm('이 문서를 삭제하시겠습니까?')) return;
      docs = docs.filter(d => d.id !== editDocId);
      closeUploadModal();
      render();
    }

    // ── 상세 모달 ──
    function openDetailModal(id) {
      currentDetailId = id;
      const d = docs.find(x => x.id === id);
      if (!d) return;
      const ec = extConfig[d.ext] || defExt;
      const cc = catColors[d.category] || catColors['기타'];
      const accessColor = { '전체':'text-emerald-600 bg-emerald-50', '팀내':'text-blue-600 bg-blue-50', '관리자':'text-red-600 bg-red-50' };
      document.getElementById('detailTitle').textContent = d.name;
      document.getElementById('detailBody').innerHTML = `
        <div class="flex items-center gap-4 mb-5">
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center" style="background:${ec.bg};">
            <i class="fa-solid ${ec.icon} text-3xl" style="color:${ec.color};"></i>
          </div>
          <div>
            <p class="font-bold text-gray-800">${d.name}</p>
            <p class="text-sm text-gray-500">${ec.label} · ${d.size}</p>
          </div>
        </div>
        <div class="space-y-2.5 text-sm">
          <div class="flex justify-between"><span class="text-gray-500">프로젝트</span><span class="font-medium text-gray-800">${d.project}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">분류</span><span class="text-xs px-2 py-0.5 rounded-md font-medium ${cc}">${d.category}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">버전</span><span class="font-mono font-semibold text-gray-800">${d.version}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">업로더</span><span class="font-medium text-gray-800">${d.uploader}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">업로드일</span><span class="font-medium text-gray-800">${d.uploadDate}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">접근 권한</span><span class="text-xs px-2 py-0.5 rounded-md font-medium ${accessColor[d.access]||''}">${d.access}</span></div>
          ${d.desc ? `<div class="pt-2 border-t border-gray-100"><p class="text-gray-500 mb-1">설명</p><p class="text-gray-700">${d.desc}</p></div>` : ''}
        </div>`;
      document.getElementById('detailModal').classList.remove('hidden');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.add('hidden');
      currentDetailId = null;
    }

    // ── Init ──
    render();
  </script>
</body>
</html>
