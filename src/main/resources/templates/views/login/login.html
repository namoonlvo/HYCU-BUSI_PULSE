<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busi Pulse | 로그인</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#5038A6',
              50:  '#F0ECFF',
              100: '#E0D8FF',
              200: '#C2B2FF',
              300: '#A38BFF',
              400: '#7F62D1',
              500: '#5038A6',
              600: '#3D2A85',
              700: '#2C1E64',
              800: '#1C1243',
              900: '#0D0822',
            },
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans KR', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }

    .input-field {
      transition: border-color .2s, box-shadow .2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #5038A6;
      box-shadow: 0 0 0 3px rgba(80, 56, 166, .15);
    }

    .btn-login {
      transition: background .2s, transform .1s, box-shadow .2s;
    }
    .btn-login:hover {
      background: #3D2A85;
      box-shadow: 0 4px 16px rgba(80, 56, 166, .35);
    }
    .btn-login:active {
      transform: scale(.98);
    }

    /* 배경 장식 원 */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .25;
      pointer-events: none;
    }
  </style>
</head>

<body class="min-h-screen bg-gray-50 flex items-center justify-center relative overflow-hidden">

  <!-- 배경 장식 -->
  <div class="bg-orb w-96 h-96 bg-brand-300 -top-24 -left-24"></div>
  <div class="bg-orb w-80 h-80 bg-brand-200 bottom-0 right-0 translate-x-1/4 translate-y-1/4"></div>

  <!-- 로그인 카드 -->
  <div class="relative z-10 w-full max-w-md mx-4">

    <!-- 로고 & 타이틀 -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-500 shadow-lg mb-4">
        <i class="fa-solid fa-bolt text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Busi Pulse</h1>
      <p class="text-sm text-gray-500 mt-1">업무 관리 시스템에 로그인하세요</p>
    </div>

    <!-- 카드 -->
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">

      <!-- 에러 메시지 (th:if로 조건부 표시 예정) -->
      <div th:if="${param.error}" class="mb-5 flex items-center gap-2 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm">
        <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
        <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
      </div>
      <div th:if="${param.logout}" class="mb-5 flex items-center gap-2 px-4 py-3 rounded-lg bg-green-50 border border-green-200 text-green-600 text-sm">
        <i class="fa-solid fa-circle-check flex-shrink-0"></i>
        <span>로그아웃 되었습니다.</span>
      </div>

      <form method="post" th:action="@{/login}" class="space-y-5">

        <!-- 아이디 -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">아이디</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400 pointer-events-none">
              <i class="fa-regular fa-user text-sm"></i>
            </span>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="아이디를 입력하세요"
              required
              class="input-field w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50 text-sm text-gray-800 placeholder-gray-400"
            />
          </div>
        </div>

        <!-- 비밀번호 -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400 pointer-events-none">
              <i class="fa-regular fa-lock text-sm"></i>
            </span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="비밀번호를 입력하세요"
              required
              class="input-field w-full pl-10 pr-10 py-2.5 rounded-lg border border-gray-200 bg-gray-50 text-sm text-gray-800 placeholder-gray-400"
            />
            <!-- 비밀번호 토글 -->
            <button
              type="button"
              onclick="togglePassword()"
              class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-400 hover:text-gray-600"
              tabindex="-1"
            >
              <i id="pw-eye" class="fa-regular fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <!-- 로그인 버튼 -->
        <button
          type="submit"
          class="btn-login w-full py-2.5 rounded-lg bg-brand-500 text-white font-semibold text-sm tracking-wide mt-2"
        >
          로그인
        </button>

      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      &copy; 2026 HYCU Busi Pulse. All rights reserved.
    </p>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('pw-eye');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>

</body>
</html>
